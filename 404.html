    <style>
        :root {
            --black: #000000;
            --dark: #0a0a0a;
            --cyan: #00ff00;
            --green: #00ff80;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }
        
        .error-code {
            font-family: 'Space Mono', monospace;
            font-size: clamp(120px, 20vw, 200px);
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 2px var(--cyan);
            text-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            line-height: 1;
            margin-bottom: 20px;
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }
        
        .error-title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 24px;
        }
        
        .error-message {
            font-size: 18px;
            color: #ffffff;
            max-width: 400px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }
        
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--black);
            background: var(--cyan);
            padding: 16px 32px;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .home-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .home-link:hover::before {
            left: 100%;
        }
        
        .home-link:hover {
            background: var(--green);
            box-shadow: 0 0 30px rgba(0, 255, 128, 0.5);
            transform: translateY(-2px);
        }
        
        .home-link svg {
            width: 16px;
            height: 16px;
        }
        
        /* Logo */
        .logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            border: 2px solid var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .logo-icon::before {
            content: 'DLT';
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--cyan);
        }
        
        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.1em;
        }
        
        /* Decorative elements */
        .corner {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            pointer-events: none;
        }
        
        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
        
        /* Scan line effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.1;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        /* Terminal style text */
        .terminal-text {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: rgba(0, 255, 255, 0.4);
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .terminal-text::before {
            content: '> ';
            color: var(--green);
        }
        
        @media (max-width: 768px) {
            .logo {
                top: 20px;
            }
            
            .corner {
                width: 50px;
                height: 50px;
            }
            
            .error-message {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <a href="index.html" class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">DLT</span>
    </a>
    
    <div class="content">
        <div class="error-code">404</div>
        <div class="error-title">Block Not Found</div>
        <p class="error-message">
            The page you're looking for doesn't exist on this ledger. It may have been moved, deleted, or never existed.
        </p>
        <a href="index.html" class="home-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Return Home
        </a>
    </div>
    
    <div class="terminal-text">ERROR: REQUESTED_BLOCK_NOT_FOUND</div>
</body>
