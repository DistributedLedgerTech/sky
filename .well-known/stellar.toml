# ============================================================
# DUAL-CURRENCY MODEL
# ============================================================
#
# KNEX and UBX form a dual-denomination single-currency system:
#
#   issuer_knex (AUTH_REQUIRED + AUTH_REVOCABLE + AUTH_CLAWBACK_ENABLED)
#     - Issues KNEX only — frozen migration claim for L1 DAG mainnet
#     - Cannot be sent or traded on Stellar
#     - Balance auto-adjusts when UBX moves (via clawback/issue)
#     - Only becomes tradeable on Ayedex after L1 DAG launch
#     - New KNEX trustlines require authorization
#
#   issuer_ubx (NO flags — permissionless)
#     - Issues UBX only — the only tradeable token on Stellar
#     - Freely tradable on DEX (UBX/XLM)
#     - Anyone can create a UBX trustline — no authorization needed
#     - Bridge currency to the outside world
#
# Both represent the same value. KNEX balance = UBX balance / epoch_rate.
# When UBX changes, KNEX auto-adjusts via the balance sync service.
#
# Price discovery:
#   UBX trades on DEX → gets a market price
#   1 KNEX = epoch_rate × UBX_market_price

