# ============================================================
# MIGRATION PATH
# ============================================================
#
# Phase 1: Stellar Testnet (current)
#   - Fundraising — sell UBX on DEX (UBX/XLM)
#   - KNEX frozen (clawback-managed migration claims)
#   - Balance sync keeps KNEX = UBX / epoch_rate
#   - UBX trustline required, KNEX trustline optional
#
# Phase 2: L1 DAG Mainnet (September 2026)
#   - Snapshot Stellar UBX balances
#   - Calculate KNEX = UBX / final_epoch_rate
#   - Seed L1 DAG genesis with migrated KNEX balances
#   - PoB validators earn 715,184,990 KNEX over 77 years (4-year halvings)
#   - Tail emission: 61,358,010 KNEX from 2103 to year 3000
#
# Phase 3: Ayedex + Merchant Adoption
#   - KNEX becomes tradeable on Ayedex (stable, merchant-driven)
#   - UBX traded globally on exchanges (liquid, speculative)

