<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dlt-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Interconnected blocks symbol -->
  <g filter="url(#glow)">
    <!-- First block -->
    <rect x="4" y="12" width="18" height="18" rx="4" fill="url(#dlt-gradient)" opacity="1"/>
    <!-- Second block (overlapping) -->
    <rect x="15" y="18" width="18" height="18" rx="4" fill="url(#dlt-gradient)" opacity="0.7"/>
    <!-- Third block (overlapping) -->
    <rect x="26" y="12" width="18" height="18" rx="4" fill="url(#dlt-gradient)" opacity="0.4"/>
  </g>
</svg>
